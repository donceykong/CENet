# TODO: Use dataset_name to determine paths of other fields
dataset_path: /media/donceykong/doncey_ssd_02/datasets/KITTI360 # path to dataset
dataset_name: KITTI-360  # "KITTI-360" or "CU-MULTI"
infer_or_train: infer   # "train" or "infer"
# For KITTI-360 inference with MCD-trained model: use data_cfg_kitti360.yaml (has split.test and paths)
data_config: /home/donceykong/Desktop/ARPG/projects/fall_2024/OSM-AS-A-PRIOR-FULL/CENet/ce_net/config/data_cfg_mcd.yaml
relative_infer_dir: "inferred_labels/cenet_mcd"

inference:
  # MCD-trained model for KITTI-360 inference; or semantic_kitti for regular labels
  model_path: /media/donceykong/donceys_data_ssd/models/CENet/mcd_style/cenet_mcd-512
  split: test # "valid", "train", or "test"

training:
  # Label config
  # model_path: /media/donceykong/donceys_data_ssd/models/CENet/cumulti_osm_style
  model_name: cenet_osm-512
  use_progressive_growing: True

  model_configs:
    cenet_osm-512:
      arch_config: ./config/arch/train/cenet_osm-512.yaml
      model_name: cenet_osm-512

    cenet_osm-1024:
      arch_config: ./config/arch/train/cenet_osm-1024p.yaml
      model_name: cenet_osm-1024
      pretrained_model_path: ./models/cumulti_osm_style/cenet_osm-512

    cenet_osm-2048:
      arch_config: ./config/arch/train/cenet_osm-2048p.yaml
      model_name: cenet_osm-2048
      pretrained_model_path: ./models/cumulti_osm_style/cenet_osm-1024